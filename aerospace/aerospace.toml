# ─────────────────────────────────────────────
#  AeroSpace Configuration
#  Monitor 1 (primary)   → Workspaces 1–5
#  Monitor 2 (secondary) → Workspaces 6–9
#  Jump monitors: alt-`  |  move window: alt-shift-`
# ─────────────────────────────────────────────

# Notify SketchyBar on workspace change + which monitor is focused
exec-on-workspace-change = [
  '/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE PREV_WORKSPACE=$AEROSPACE_PREV_WORKSPACE'
]
start-at-login = true

enable-normalization-flatten-containers = true
enable-normalization-opposite-orientation-for-nested-containers = true

# ─────────────────────────────────────────────
#  Pin workspaces to monitors
#  Stable regardless of physical placement (side-by-side or stacked)
# ─────────────────────────────────────────────
[workspace-to-monitor-force-assignment]
1 = [2, 1]
2 = [2, 1]
3 = [2, 1]
4 = [2, 1]
5 = [2, 1]
6 = [1, 2]
7 = [1, 2]
8 = [1, 2]
9 = [1, 2]

# ─────────────────────────────────────────────
#  Gaps
#  outer.top is extra padding *below* SketchyBar on top of the
#  safe-area AeroSpace already respects. Increase if SketchyBar
#  overlaps windows (common when bar height > default menu bar).
# ─────────────────────────────────────────────
[gaps]
inner.horizontal = 5
inner.vertical   = 5
outer.left       = 5
outer.bottom     = 5
outer.top        = 43  
outer.right      = 5

# ─────────────────────────────────────────────
#  Main mode
# ─────────────────────────────────────────────
[mode.main.binding]

# ── Focus windows ────────────────────────────
alt-left  = 'focus left'
alt-down  = 'focus down'
alt-up    = 'focus up'
alt-right = 'focus right'

# ── Move windows ─────────────────────────────
alt-shift-left  = 'move left'
alt-shift-down  = 'move down'
alt-shift-up    = 'move up'
alt-shift-right = 'move right'

# ── Resize ───────────────────────────────────
alt-ctrl-left  = 'resize width -50'
alt-ctrl-right = 'resize width +50'
alt-ctrl-up    = 'resize height -50'
alt-ctrl-down  = 'resize height +50'

# ── Layout toggles ───────────────────────────
alt-slash   = 'layout tiles horizontal vertical'
alt-comma   = 'layout accordion horizontal vertical'
alt-f       = 'fullscreen'
alt-shift-f = 'layout floating tiling'

# Balance sizes
alt-shift-equal = 'balance-sizes'

# ── Monitor navigation ───────────────────────
# Position-agnostic: cycles through monitors regardless of
# whether they are stacked vertically or placed side by side.
alt-m       = 'focus-monitor --wrap-around next'
alt-shift-m = 'move-node-to-monitor --wrap-around next'

# ── Workspaces: Monitor 1 → 1–5 ─────────────
alt-1 = 'workspace 1'
alt-2 = 'workspace 2'
alt-3 = 'workspace 3'
alt-4 = 'workspace 4'
alt-5 = 'workspace 5'

# ── Workspaces: Monitor 2 → 6–9 ─────────────
alt-6 = 'workspace 6'
alt-7 = 'workspace 7'
alt-8 = 'workspace 8'
alt-9 = 'workspace 9'

# ── Move window to workspace (and follow it) ─
alt-shift-1 = ['move-node-to-workspace 1', 'workspace 1']
alt-shift-2 = ['move-node-to-workspace 2', 'workspace 2']
alt-shift-3 = ['move-node-to-workspace 3', 'workspace 3']
alt-shift-4 = ['move-node-to-workspace 4', 'workspace 4']
alt-shift-5 = ['move-node-to-workspace 5', 'workspace 5']
alt-shift-6 = ['move-node-to-workspace 6', 'workspace 6']
alt-shift-7 = ['move-node-to-workspace 7', 'workspace 7']
alt-shift-8 = ['move-node-to-workspace 8', 'workspace 8']
alt-shift-9 = ['move-node-to-workspace 9', 'workspace 9']

# ── Back-and-forth / move workspace to monitor
alt-tab       = 'workspace-back-and-forth'
alt-shift-tab = 'move-workspace-to-monitor --wrap-around next'

# ── Meta ─────────────────────────────────────
alt-shift-r         = 'reload-config'
alt-shift-semicolon = 'mode service'

# ─────────────────────────────────────────────
#  Service mode  (alt-shift-; → Esc to exit)
# ─────────────────────────────────────────────
[mode.service.binding]
esc       = 'mode main'
r         = ['flatten-workspace-tree', 'mode main']
backspace = ['close-all-windows-but-current', 'mode main']

alt-shift-left  = ['join-with left',  'mode main']
alt-shift-down  = ['join-with down',  'mode main']
alt-shift-up    = ['join-with up',    'mode main']
alt-shift-right = ['join-with right', 'mode main']

# ─────────────────────────────────────────────
#  Window rules
# ─────────────────────────────────────────────
[[on-window-detected]]
if.app-id = 'com.apple.finder'
run       = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.systempreferences'
run       = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.calculator'
run       = 'layout floating'

[[on-window-detected]]
if.app-id = 'com.apple.spotify'
run       = 'layout floating'
